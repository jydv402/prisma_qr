name: prisma_qr_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_ringtone_player: ^4.0.0+4
  get: ^4.7.3
  mobile_scanner: ^7.2.0
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  share_plus: ^12.0.1
  shared_preferences: ^2.5.4
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  vibration: ^3.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  package_rename: ^1.10.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/sounds/
    
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: GSansFlex
      fonts:
        - asset: assets/fonts/GSansFlex-Regular.ttf
          weight: 400
        - asset: assets/fonts/GSansFlex-Medium.ttf
          weight: 500
        - asset: assets/fonts/GSansFlex-SemiBold.ttf
          weight: 600

package_rename_config:
  android:
    app_name: "Prisma QR" # Display name
    package_name: "com.jdmakes.prisma_qr" # Package name

  ios:
    app_name: "Prisma QR" # Display name
    bundle_name: "Prisma QR" # Bundle name
    package_name: "com.jdmakes.prisma_qr" # Product Bundle Identifier

  linux:
    app_name: "Prisma QR" # Window title
    package_name: "com.jdmakes.prisma_qr" # Application ID
    exe_name: "prisma_qr" # Executable name (binary)

  macos:
    app_name: "Prisma QR" # Product name
    package_name: "com.jdmakes.prisma_qr" # Product Bundle Identifier

  web:
    app_name: "Prisma QR" # App title & PWA name
    short_app_name: "Prisma QR" # PWA short name (defaults to app_name)
    description: "QR Code Scanner & Generator" # Web app description

  windows:
    app_name: "Prisma QR" # Window title & Software name
    organization: "JD Makes" # Organization/Company name
    exe_name: "prisma_qr" # Executable name (binary)
